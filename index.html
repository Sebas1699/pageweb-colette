<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colette Sleepwear | Sueña Bonito</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">COLETTE</div>
        <nav>
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#coleccion">Colección</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section id="inicio" class="hero">
        <div class="hero-content">
            <span class="swan-icon">🦢</span>
            <h1>SUEÑA BONITO.</h1>
            <p>Despierta radiante con nuestra exclusiva colección.</p>
            <a href="https://wa.me/tu-numero" class="btn-primary">Ver Catálogo</a>
        </div>
    </section>

    <section id="coleccion" class="container">
        <h2 class="section-title">Nuestra Colección</h2>
        <div class="gallery-grid">
            <div class="card"><img src="pijama-1.jpg" alt="Pijama Colette"></div>
            <div class="card"><img src="pijama-2.jpg" alt="Pijama Colette"></div>
            <div class="card"><img src="pijama-3.jpg" alt="Pijama Colette"></div>
            <div class="card"><img src="pijama-4.jpg" alt="Pijama Colette"></div>
            <div class="card"><img src="pijama-5.jpg" alt="Pijama Colette"></div>
            <div class="card"><img src="pijama-6.jpg" alt="Pijama Colette"></div>
        </div>
    </section>

    <footer id="contacto">
        <p>&copy; 2024 Colette Sleepwear - Villavicencio</p>
        <div class="social-links">
            <a href="#">Instagram</a> | <a href="#">WhatsApp</a>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
